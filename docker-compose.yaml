services:
  my-js-app:
    image: 250847881018.dkr.ecr.ca-central-1.amazonaws.com/my-app:1.0
    ports:
      - 3000:3000
    networks:
      - mongo-network
    depends_on:
      - mongodb

  mongodb:
    image: mongo
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongo-data:/data/db
    networks:
      - mongo-network

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=password
      - ME_CONFIG_MONGODB_SERVER=mongodb
    depends_on:
      - mongodb
    networks:
      - mongo-network

  nexus:
    image: sonatype/nexus3
    container_name: nexus
    ports:
      - 8082:8081
      - 8083:8083
    volumes:
      - nexus-data:/nexus-data
    networks:
      - mongo-network

volumes:
  mongo-data:
    driver: local
  nexus-data:
    driver: local

networks:
  mongo-network:
    driver: bridge

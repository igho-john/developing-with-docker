<svg xmlns="http://www.w3.org/2000/svg" width="720" viewBox="0 0 720 980" role="img" style="font-family: Arial, sans-serif; background: #ffffff;">
  <title>Docker CI/CD workflow — Frontend JS, Backend Node.js, MongoDB, Mongo Express</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#166534" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── DEVELOPER ── -->
  <rect x="240" y="30" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="360" y="54" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Developer</text>
  <text x="360" y="72" text-anchor="middle" font-size="12" fill="#534AB7">writes the application</text>

  <line x1="360" y1="86" x2="360" y2="134" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── COMBINED APP BOX ── -->
  <rect x="160" y="136" width="400" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="360" y="160" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">JavaScript application</text>

  <!-- Frontend inner -->
  <rect x="176" y="172" width="168" height="64" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="260" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#72243E">Frontend</text>
  <text x="260" y="214" text-anchor="middle" font-size="11" fill="#993556">React / JS · port 3000</text>

  <!-- Backend inner -->
  <rect x="376" y="172" width="168" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="460" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Backend</text>
  <text x="460" y="214" text-anchor="middle" font-size="11" fill="#534AB7">Node.js · port 8080</text>

  <!-- arrow app to git -->
  <line x1="360" y1="256" x2="360" y2="304" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="392" y="283" text-anchor="start" font-size="11" fill="#BA7517">git commit</text>

  <!-- ── GIT ── -->
  <rect x="260" y="306" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Git repository</text>
  <text x="340" y="348" text-anchor="middle" font-size="12" fill="#854F0B">source of truth</text>

  <!-- arrow git to jenkins -->
  <line x1="420" y1="334" x2="468" y2="334" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="444" y="326" text-anchor="middle" font-size="11" fill="#BA7517">triggers</text>

  <!-- ── JENKINS ── -->
  <rect x="470" y="306" width="200" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="570" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Jenkins CI</text>
  <text x="570" y="348" text-anchor="middle" font-size="12" fill="#854F0B">continuous integration</text>

  <line x1="570" y1="362" x2="570" y2="420" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ── JENKINS STEPS ── -->
  <rect x="400" y="422" width="278" height="170" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="539" y="446" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Jenkins pipeline steps</text>
  <rect x="416" y="458" width="246" height="30" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="539" y="477" text-anchor="middle" font-size="12" fill="#2C2C2A">1 · checkout code from Git</text>
  <rect x="416" y="496" width="246" height="30" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="539" y="515" text-anchor="middle" font-size="12" fill="#2C2C2A">2 · install deps + run tests</text>
  <rect x="416" y="534" width="246" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="539" y="553" text-anchor="middle" font-size="12" fill="#3C3489">3 · docker build app image</text>

  <!-- ── DOCKER HUB ── -->
  <rect x="20" y="422" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="446" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Docker Hub</text>
  <text x="110" y="464" text-anchor="middle" font-size="12" fill="#0F6E56">public registry</text>

  <line x1="110" y1="478" x2="110" y2="526" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="116" y="505" text-anchor="start" font-size="11" fill="#0F6E56">docker pull</text>

  <!-- MongoDB + Mongo Express images from Docker Hub -->
  <rect x="20" y="528" width="180" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="110" y="546" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">MongoDB image</text>
  <text x="110" y="562" text-anchor="middle" font-size="11" fill="#0F6E56">from Docker Hub</text>

  <line x1="110" y1="572" x2="110" y2="612" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="116" y="595" text-anchor="start" font-size="11" fill="#0F6E56">docker pull</text>

  <rect x="20" y="614" width="180" height="44" rx="8" fill="#DCFCE7" stroke="#166534" stroke-width="0.5"/>
  <text x="110" y="632" text-anchor="middle" font-size="13" font-weight="500" fill="#14532D">Mongo Express image</text>
  <text x="110" y="648" text-anchor="middle" font-size="11" fill="#166534">UI for MongoDB · hub</text>

  <!-- arrows from mongodb + mongo-express to private registry -->
  <path d="M200 550 L300 550 L300 698" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <path d="M200 636 L280 636 L280 698" fill="none" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="240" y="542" text-anchor="middle" font-size="10" fill="#0F6E56">push to</text>
  <text x="240" y="554" text-anchor="middle" font-size="10" fill="#0F6E56">registry</text>

  <!-- arrow jenkins to private registry -->
  <line x1="539" y1="592" x2="450" y2="698" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="530" y="644" text-anchor="start" font-size="11" fill="#BA7517">docker push</text>

  <!-- ── PRIVATE REGISTRY ── -->
  <rect x="200" y="700" width="400" height="72" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="400" y="724" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Private Docker registry</text>
  <text x="400" y="744" text-anchor="middle" font-size="12" fill="#185FA5">JS app + MongoDB + Mongo Express</text>
  <text x="400" y="760" text-anchor="middle" font-size="11" fill="#185FA5">all 3 images stored here</text>

  <!-- arrow registry to dev server -->
  <line x1="400" y1="772" x2="400" y2="818" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="432" y="798" text-anchor="start" font-size="11" fill="#185FA5">docker pull all images</text>

  <!-- ── DEV SERVER ── -->
  <rect x="20" y="820" width="680" height="130" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="360" y="844" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Dev server — Docker Compose</text>

  <!-- JS App container -->
  <rect x="36" y="856" width="180" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="126" y="876" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489">JS app container</text>
  <text x="126" y="892" text-anchor="middle" font-size="10" fill="#534AB7">Frontend + Backend</text>
  <text x="126" y="904" text-anchor="middle" font-size="10" fill="#534AB7">port 3000 / 8080</text>

  <!-- MongoDB container -->
  <rect x="256" y="856" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="346" y="876" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">MongoDB container</text>
  <text x="346" y="892" text-anchor="middle" font-size="10" fill="#0F6E56">database</text>
  <text x="346" y="904" text-anchor="middle" font-size="10" fill="#0F6E56">port 27017</text>

  <!-- Mongo Express container -->
  <rect x="476" y="856" width="208" height="56" rx="8" fill="#DCFCE7" stroke="#166534" stroke-width="0.5"/>
  <text x="580" y="876" text-anchor="middle" font-size="12" font-weight="500" fill="#14532D">Mongo Express container</text>
  <text x="580" y="892" text-anchor="middle" font-size="10" fill="#166534">UI to view MongoDB data</text>
  <text x="580" y="904" text-anchor="middle" font-size="10" fill="#166534">port 8081</text>

  <!-- arrows between containers -->
  <line x1="216" y1="884" x2="254" y2="884" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="235" y="876" text-anchor="middle" font-size="10" fill="#534AB7">queries</text>

  <line x1="436" y1="884" x2="474" y2="884" stroke="#166534" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="455" y="876" text-anchor="middle" font-size="10" fill="#166534">reads DB</text>

  <!-- ── LEGEND ── -->
  <line x1="20" y1="964" x2="700" y2="964" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="20" y="969" width="8" height="8" rx="1" fill="#FBEAF0" stroke="#993556"/>
  <text x="34" y="978" font-size="10" fill="#444441">Frontend JS</text>
  <rect x="110" y="969" width="8" height="8" rx="1" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="124" y="978" font-size="10" fill="#444441">Backend Node.js</text>
  <rect x="230" y="969" width="8" height="8" rx="1" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="244" y="978" font-size="10" fill="#444441">MongoDB</text>
  <rect x="320" y="969" width="8" height="8" rx="1" fill="#DCFCE7" stroke="#166534"/>
  <text x="334" y="978" font-size="10" fill="#444441">Mongo Express UI</text>
  <rect x="450" y="969" width="8" height="8" rx="1" fill="#FAEEDA" stroke="#BA7517"/>
  <text x="464" y="978" font-size="10" fill="#444441">Jenkins CI</text>
  <rect x="540" y="969" width="8" height="8" rx="1" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="554" y="978" font-size="10" fill="#444441">Registry / Server</text>
</svg>

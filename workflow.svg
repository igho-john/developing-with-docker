<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 860" role="img" style="font-family: Arial, sans-serif; background: #ffffff;">
  <title>Docker CI/CD workflow — Frontend JS and Backend Node.js in one app</title>
  <desc>Full workflow from developer writing a combined frontend JS and backend Node.js app, committing to Git, through Jenkins CI building Docker images, pushing to a private registry, then deploying to a dev server.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── DEVELOPER ── -->
  <rect x="220" y="30" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="54" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Developer</text>
  <text x="340" y="72" text-anchor="middle" font-size="12" fill="#534AB7">writes the application</text>

  <!-- arrow dev down to app box -->
  <line x1="340" y1="86" x2="340" y2="134" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── COMBINED APP BOX ── -->
  <rect x="160" y="136" width="360" height="120" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="160" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">JavaScript application</text>

  <!-- Frontend inner box -->
  <rect x="176" y="172" width="152" height="64" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="252" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#72243E">Frontend</text>
  <text x="252" y="212" text-anchor="middle" font-size="11" fill="#993556">React / JS · port 3000</text>

  <!-- Backend inner box -->
  <rect x="352" y="172" width="152" height="64" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="428" y="196" text-anchor="middle" font-size="13" font-weight="500" fill="#3C3489">Backend</text>
  <text x="428" y="212" text-anchor="middle" font-size="11" fill="#534AB7">Node.js · port 8080</text>

  <!-- arrow app to git -->
  <line x1="340" y1="256" x2="340" y2="304" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="372" y="283" text-anchor="start" font-size="11" fill="#BA7517">git commit</text>

  <!-- ── GIT ── -->
  <rect x="240" y="306" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="320" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Git repository</text>
  <text x="320" y="348" text-anchor="middle" font-size="12" fill="#854F0B">source of truth</text>

  <!-- arrow git to jenkins -->
  <line x1="400" y1="334" x2="448" y2="334" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="424" y="326" text-anchor="middle" font-size="11" fill="#BA7517">triggers</text>

  <!-- ── JENKINS ── -->
  <rect x="450" y="306" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="540" y="330" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Jenkins CI</text>
  <text x="540" y="348" text-anchor="middle" font-size="12" fill="#854F0B">continuous integration</text>

  <!-- arrow jenkins down to steps -->
  <line x1="540" y1="362" x2="540" y2="420" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ── JENKINS PIPELINE STEPS ── -->
  <rect x="370" y="422" width="268" height="170" rx="12" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="504" y="446" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Jenkins pipeline steps</text>

  <rect x="386" y="458" width="236" height="30" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="504" y="477" text-anchor="middle" font-size="12" fill="#2C2C2A">1 · checkout code from Git</text>

  <rect x="386" y="496" width="236" height="30" rx="6" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="504" y="515" text-anchor="middle" font-size="12" fill="#2C2C2A">2 · install deps + run tests</text>

  <rect x="386" y="534" width="236" height="30" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="504" y="553" text-anchor="middle" font-size="12" fill="#3C3489">3 · docker build app image</text>

  <!-- ── DOCKER HUB ── -->
  <rect x="30" y="422" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="120" y="446" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Docker Hub</text>
  <text x="120" y="464" text-anchor="middle" font-size="12" fill="#0F6E56">public registry</text>

  <line x1="120" y1="478" x2="120" y2="526" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="152" y="505" text-anchor="start" font-size="11" fill="#0F6E56">docker pull</text>

  <!-- MongoDB image -->
  <rect x="44" y="528" width="152" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="120" y="546" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">MongoDB image</text>
  <text x="120" y="562" text-anchor="middle" font-size="11" fill="#0F6E56">from Docker Hub</text>

  <!-- arrow mongodb to private registry -->
  <path d="M196 550 L290 550 L290 648" fill="none" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow-teal)"/>
  <text x="243" y="542" text-anchor="middle" font-size="11" fill="#0F6E56">push to registry</text>

  <!-- arrow jenkins steps to private registry -->
  <line x1="504" y1="592" x2="420" y2="648" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="490" y="624" text-anchor="start" font-size="11" fill="#BA7517">docker push</text>

  <!-- ── PRIVATE REGISTRY ── -->
  <rect x="200" y="650" width="360" height="64" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="380" y="674" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Private Docker registry</text>
  <text x="380" y="696" text-anchor="middle" font-size="12" fill="#185FA5">JS app image + MongoDB image</text>

  <!-- arrow registry down to dev server -->
  <line x1="380" y1="714" x2="380" y2="762" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="412" y="741" text-anchor="start" font-size="11" fill="#185FA5">docker pull both images</text>

  <!-- ── DEV SERVER ── -->
  <rect x="40" y="764" width="600" height="62" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="786" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Dev server</text>

  <!-- App container (combined) -->
  <rect x="56" y="800" width="260" height="12" rx="0" fill="none"/>
  <rect x="56" y="778" width="260" height="32" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="186" y="799" text-anchor="middle" font-size="12" font-weight="500" fill="#3C3489">JS app container (FE + BE)</text>

  <!-- arrow between app and mongo -->
  <line x1="316" y1="794" x2="354" y2="794" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MongoDB container -->
  <rect x="356" y="778" width="260" height="32" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="486" y="799" text-anchor="middle" font-size="12" font-weight="500" fill="#085041">MongoDB container · port 27017</text>

  <!-- Docker Compose label -->
  <text x="340" y="840" text-anchor="middle" font-size="11" fill="#185FA5">managed by Docker Compose</text>

  <!-- ── LEGEND ── -->
  <line x1="40" y1="854" x2="640" y2="854" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="858" width="8" height="8" rx="1" fill="#FBEAF0" stroke="#993556"/>
  <text x="54" y="867" font-size="10" fill="#444441">Frontend JS</text>
  <rect x="130" y="858" width="8" height="8" rx="1" fill="#EEEDFE" stroke="#534AB7"/>
  <text x="144" y="867" font-size="10" fill="#444441">Backend Node.js</text>
  <rect x="250" y="858" width="8" height="8" rx="1" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="264" y="867" font-size="10" fill="#444441">MongoDB</text>
  <rect x="340" y="858" width="8" height="8" rx="1" fill="#FAEEDA" stroke="#BA7517"/>
  <text x="354" y="867" font-size="10" fill="#444441">Jenkins CI</text>
  <rect x="420" y="858" width="8" height="8" rx="1" fill="#E6F1FB" stroke="#185FA5"/>
  <text x="434" y="867" font-size="10" fill="#444441">Registry / Server</text>
</svg>
